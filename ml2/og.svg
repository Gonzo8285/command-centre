<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="ML2 Consulting — Senior IT plus AI delivery team">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo mark, top-left -->
  <rect x="64" y="64" width="100" height="100" rx="22" fill="#2563EB"/>
  <text x="114" y="135" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="white" letter-spacing="-2.5">ML</text>
  <text x="148" y="92" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="white">2</text>
  <text x="186" y="128" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.85)">ML² Consulting</text>

  <!-- Headline -->
  <text x="64" y="324" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-2.5">We ship in a day,</text>
  <text x="64" y="404" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="#60a5fa" letter-spacing="-2.5">not a quarter.</text>

  <!-- Subtitle -->
  <text x="64" y="468" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.78)">Senior IT — AI-multiplied delivery</text>

  <!-- Bottom band -->
  <rect x="64" y="528" width="1072" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <text x="92" y="555" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.92)">25 years senior IT · AI delivery stack · Live URLs, every iteration · ml2-consulting</text>
</svg>
